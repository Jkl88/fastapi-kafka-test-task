services:
  kafka:
    image: apache/kafka:3.9.2
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1
      - KAFKA_NUM_PARTITIONS=3
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_LOG_DIRS=/tmp/kraft-combined-logs
      - CLUSTER_ID=abcdefghijklmnopqrstuv
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build: .
    container_name: fastapi_api
    ports:
      - "8000:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: events
      KAFKA_CONSUMER_GROUP: events-consumer-group
    depends_on:
      kafka:
        condition: service_healthy

  consumer_1:
    build: .
    container_name: consumer_1
    command: ["python", "-m", "app.consumer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: events
      KAFKA_CONSUMER_GROUP: events-consumer-group
      CONSUMER_REPORT_URL: http://api:8000/internal/consumer-events
      WORKER_NAME: consumer_1
    depends_on:
      kafka:
        condition: service_healthy

  consumer_2:
    build: .
    container_name: consumer_2
    command: ["python", "-m", "app.consumer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: events
      KAFKA_CONSUMER_GROUP: events-consumer-group
      CONSUMER_REPORT_URL: http://api:8000/internal/consumer-events
      WORKER_NAME: consumer_2
    depends_on:
      kafka:
        condition: service_healthy

  consumer_3:
    build: .
    container_name: consumer_3
    command: ["python", "-m", "app.consumer"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: events
      KAFKA_CONSUMER_GROUP: events-consumer-group
      CONSUMER_REPORT_URL: http://api:8000/internal/consumer-events
      WORKER_NAME: consumer_3
    depends_on:
      kafka:
        condition: service_healthy
